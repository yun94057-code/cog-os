<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧠 Cognitive OS — Brice的数字分身</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--text:#e0e0e0;--muted:#888;--accent:#2563eb;--user-bubble:#2563eb;--ai-bubble:#1e1e1e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overscroll-behavior:none}
header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:16px;font-weight:600}
header .actions{display:flex;gap:8px}
header .actions button{background:var(--border);border:none;color:var(--muted);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{max-width:88%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--ai-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.system{align-self:center;color:var(--muted);font-size:12px;text-align:center;max-width:100%;background:transparent;padding:6px}
.msg .time{font-size:10px;color:var(--muted);margin-top:3px}
.msg.user .time{color:#a0c4ff}
.toolbar{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.toolbar button{background:var(--border);border:none;color:#ccc;padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.toolbar button:active{background:#444}
.toolbar button.recording{background:#dc2626;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.input-area{display:flex;padding:8px 16px max(16px,env(safe-area-inset-bottom));gap:8px;background:var(--surface);flex-shrink:0}
.input-area textarea{flex:1;background:var(--border);border:1px solid #3a3a3a;border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;max-height:120px;font-family:inherit;outline:none;-webkit-appearance:none}
.input-area textarea:focus{border-color:var(--accent)}
.input-area button{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600;white-space:nowrap}
.input-area button:disabled{background:#3a3a3a;color:#666}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-content h3{margin-bottom:16px;font-size:17px}
.modal-content label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
.modal-content input,.modal-content select{width:100%;background:var(--border);border:1px solid #3a3a3a;border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:12px;-webkit-appearance:none}
.modal-content .btn-row{display:flex;gap:8px;margin-top:16px}
.modal-content .btn-row button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:600}
.modal-content .btn-primary{background:var(--accent);color:#fff}
.modal-content .btn-secondary{background:var(--border);color:#ccc}
.file-upload{display:none}
.hint{font-size:11px;color:var(--muted);margin-top:-8px;margin-bottom:12px}
<script src="https://lib.baomitu.com/mammoth/1.8.0/mammoth.browser.min.js"></script>
<script>
// 百度 CDN 备用
if (typeof mammoth === "undefined") {
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js";
  document.head.appendChild(s);
}
</script>
</style>
</head>
<body>

<header>
  <h1>🧠 Cognitive OS</h1>
  <div class="actions">
    <span id="keyStatus" style="font-size:10px;color:var(--muted);margin-right:4px"></span>
    <button onclick="showSettings()">⚙️</button>
    <button onclick="clearChat()">🗑</button>
  </div>
</header>

<div id="chat">
  <div class="msg system">Brice 的数字分身已就绪。</div>
</div>

<div class="toolbar">
  <button id="voiceBtn" onclick="toggleVoice()">🎤 语音</button>
  <button onclick="document.getElementById('fileInput').click()">📎 文档</button>
  <button onclick="doDailyLog()">📝 日志</button>
  <input type="file" id="fileInput" class="file-upload" accept=".txt,.md,.pdf,.doc,.docx,.json,.csv" onchange="handleFile(this)" multiple>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="说点什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3>⚙️ 设置</h3>
    <label>DeepSeek API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <p class="hint">Key 仅保存在你的浏览器中，不会上传到任何服务器</p>
    <label>模型</label>
    <select id="modelSelect">
      <option value="deepseek-chat">deepseek-chat (V3)</option>
      <option value="deepseek-reasoner">deepseek-reasoner (R1)</option>
    </select>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const SYSTEM_PROMPT = `你是 Brice 的数字分身。你的目标是比 Brice 自己想得更深、更全、更清晰。

=== Brice的身份 ===
Brice，13年企业培训与组织学习经验。核心能力：将复杂经验转化为结构化知识与可复制方法。
培训全链条：课程开发 → 教学设计 → 课堂交付 → 工作坊设计 → 组织共创 → 经验萃取。
正在从传统培训 → 企业AI转型咨询。3年目标：形成企业AI转型方法论，链路为：企业调研 → AI需求分析 → 知识工程 → Agent设计 → AI治理。
思维特征：从业务出发、结构化表达、区分事实/推断/假设、重视边界条件与反例、强调可复制性。

=== 核心原则 ===
1. 认知拉升优先：每轮对话让Brice的理解更深一层
2. 不鹦鹉学舌：不重复他说过的话，不给出纸上谈兵的答案
3. 结构化输出 - 解决方案类：结论+步骤+判断标准+常见误区；认知探讨类：核心洞察+拔高视角+纠偏+边界
4. 苏格拉底精神：先追问再分析，连续追问不超过4轮
5. 场景锚定：引用他言及的案例和原话

=== 关注领域 ===
企业AI转型、AI切入点判断、知识工程、AI工作流、第二大脑、Agent设计、企业培训体系重构、组织学习系统、AI能力迁移、方法论构建

=== 对话风格 ===
认知型、战略型、结构化。不过度情绪化，不一味附和。`;

// ==================== STATE ====================
let messages = [];
let apiKey = localStorage.getItem("cogos_key") || "";
let model = localStorage.getItem("cogos_model") || "deepseek-chat";
let isRecording = false;
let recognition = null;

function updateKeyStatus() {
  const el = document.getElementById("keyStatus");
  if (el) el.textContent = apiKey ? "🔑" : "";
}
setTimeout(updateKeyStatus, 100);

// ==================== UI ====================
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const now = new Date().toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"});
  div.innerHTML = text + `<div class="time">${now}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSystem(text) {
  const div = document.createElement("div");
  div.className = "msg system";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  if (confirm("清空对话记录？")) {
    chat.innerHTML = '<div class="msg system">对话已清空。</div>';
    messages = [];
  }
}

// ==================== SEND ====================
async function send() {
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { showSettings(); return; }

  addMsg("user", text);
  messages.push({role:"user", content:text});
  input.value = "";
  sendBtn.disabled = true;
  const thinking = addThinking();

  try {
    const resp = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body: JSON.stringify({
        model,
        messages: [{role:"system",content:SYSTEM_PROMPT}, ...messages],
        temperature: 0.7,
      })
    });
    const data = await resp.json();
    thinking.remove();
    if (data.error) {
      addMsg("ai", "⚠️ " + (data.error.message || JSON.stringify(data.error)));
    } else {
      const reply = data.choices[0].message.content;
      addMsg("ai", reply);
      messages.push({role:"assistant", content:reply});
    }
  } catch(e) {
    thinking.remove();
    addMsg("ai", "⚠️ 请求失败: " + e.message + "\\n请检查网络或 API Key 是否正确");
  }
  sendBtn.disabled = false;
  input.focus();
}

function addThinking() {
  const div = document.createElement("div");
  div.className = "msg system";
  div.textContent = "思考中...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ==================== DAILY LOG ====================
function doDailyLog() {
  const today = new Date().toISOString().slice(0,10);
  const prompt = `请帮我做今天的认知日志（${today}）：

1. 经验萃取：今天最重要的一个经历（只描述事实）
2. 模式识别：和之前的什么经历结构相似？
3. 认知收获：提炼一条可迁移原则（If...Then...格式）
4. 认知更新：修正了之前的什么看法？
5. 方法论建设：这条原则可以放进我的AI转型方法论框架的哪个位置？

请用苏格拉底式提问引导我，不要直接给答案。`;
  input.value = prompt;
  send();
}

// ==================== VOICE ====================
function toggleVoice() {
  const btn = document.getElementById("voiceBtn");
  if (isRecording) { 
    isRecording = false;
    recognition?.abort(); 
    btn.classList.remove("recording");
    btn.textContent = "🎤 语音";
    return; 
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    input.focus();
    addSystem("💡 vivo浏览器不支持语音，请安装 Chrome 浏览器打开");
    return;
  }
  recognition = new SR();
  recognition.lang = "zh-CN";
  recognition.interimResults = true;
  recognition.continuous = false;
  
  let finalText = "";
  
  recognition.onstart = () => { 
    isRecording = true; 
    btn.classList.add("recording"); 
    btn.textContent = "🔴 说完点我"; 
  };
  
  recognition.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    input.value = finalText + interim;
  };
  
  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "🎤 语音";
    if (finalText.trim()) {
      setTimeout(() => { input.value = finalText.trim(); }, 100);
    }
  };
  
  recognition.onerror = (e) => {
    if (e.error === "aborted" || e.error === "no-speech") {
    } else if (e.error === "not-allowed") {
      addSystem("⚠️ 请允许麦克风权限后重试");
    } else if (e.error === "network") {
      addSystem("⚠️ 语音需要网络连接");
    } else {
      addSystem("⚠️ 语音失败(" + e.error + ")，请用 Chrome 浏览器打开");
    }
    isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "🎤 语音";
    if (finalText.trim()) input.value = finalText.trim();
  };
  
  recognition.start();
}

// ==================== FILE UPLOAD ====================
async function handleFile(input) {
  for (const file of input.files) {
    let text;
    try {
      const ext = file.name.split(".").pop().toLowerCase();
      if (ext === "docx" || ext === "doc") {
        if (typeof mammoth === "undefined") {
          text = "[无法解析 " + file.name + "：解析库加载失败，请刷新页面重试]";
        } else {
          addSystem(`📄 正在解析 ${file.name}...`);
          const arrayBuffer = await file.arrayBuffer();
          const result = await mammoth.extractRawText({arrayBuffer});
          text = result.value;
          if (result.messages.length) {
            text += "\n\n[转换备注: " + result.messages.join("; ") + "]";
          }
        }
      } else if (ext === "pdf") {
        addSystem("⚠️ PDF暂不支持，请复制内容到对话框");
        text = "[PDF文件: " + file.name + " - 请将文字内容粘贴到对话框中]";
      } else if (["txt","md","json","csv","html","xml","yaml","yml"].includes(ext)) {
        text = await file.text();
      } else {
        text = await file.text(); // 尝试直接读取
        // 如果看起来像乱码，提示用户
        if (/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(text.slice(0,100))) {
          text = "[不支持的文件格式: " + file.name + " - 请转为 .txt 或 .md 后上传]";
        }
      }
    } catch(e) {
      text = "[读取失败: " + file.name + "｜" + e.message + "]";
      addSystem("⚠️ 读取失败: " + e.message.slice(0,50));
    }
    const preview = text.length > 4000 ? text.slice(0,4000) + "\n...(已截断)" : text;
    addMsg("user", `📎 ${file.name}\n${preview}`);
    messages.push({role:"user", content:`以下是我上传的文档「${file.name}」的内容：\n\n${text.slice(0,12000)}`});
  }
  input.files = null;
}

// ==================== SETTINGS ====================
function showSettings() {
  document.getElementById("apiKey").value = apiKey;
  document.getElementById("modelSelect").value = model;
  document.getElementById("settingsModal").classList.add("show");
}
function closeSettings() { document.getElementById("settingsModal").classList.remove("show"); }
function saveSettings() {
  apiKey = document.getElementById("apiKey").value.trim();
  model = document.getElementById("modelSelect").value;
  localStorage.setItem("cogos_key", apiKey);
  localStorage.setItem("cogos_model", model);
  closeSettings();
  if (apiKey) addSystem("✅ 设置已保存");
}

// ==================== INIT ====================
// 支持从 URL hash 读取 Key（格式: #key=sk-xxx）
(function(){
  const hash = window.location.hash.slice(1);
  const params = new URLSearchParams(hash);
  const hashKey = params.get("key");
  if (hashKey && hashKey.startsWith("sk-")) {
    apiKey = hashKey;
    model = params.get("model") || model;
    localStorage.setItem("cogos_key", apiKey);
    localStorage.setItem("cogos_model", model);
    // 清除 URL 中的 key，避免泄露
    history.replaceState(null, "", window.location.pathname);
  }
})();
// 强制刷新缓存（版本号递增）
var COG_VERSION = "3";
if (!apiKey) showSettings();
</script>
</body>
</html>
