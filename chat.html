<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧠 Cognitive OS — Brice 的数字分身</title>
<style>
/* ========== DESIGN TOKENS ========== */
:root {
  --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-secondary: #475569; --muted: #94a3b8;
  --accent: #6366f1; --accent-light: #eef2ff;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  --user-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.08);
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 20px; --radius-xl: 24px;
  --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ========== HEADER ========== */
header {
  background: var(--surface); padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}
.header-avatar {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--accent-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(99,102,241,.3);
}
.header-info { flex:1; min-width:0; }
.header-info h1 { font-size:15px; font-weight:600; color:var(--text); line-height:1.2; }
.header-status {
  font-size:11px; color:var(--success); display:flex; align-items:center; gap:4px;
}
.header-status::before {
  content:""; display:inline-block; width:6px; height:6px;
  border-radius:50%; background:var(--success); box-shadow: 0 0 0 2px rgba(16,185,129,.2);
}
.header-actions { display:flex; gap:6px; }
.header-actions button {
  width:34px; height:34px; border-radius:10px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-secondary); font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all .15s;
}
.header-actions button:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.header-actions button.danger:hover { background:#fef2f2; border-color:var(--danger); color:var(--danger); }

/* ========== CHAT AREA ========== */
#chat {
  flex:1; overflow-y:auto; padding:20px;
  display:flex; flex-direction:column; gap:6px; scroll-behavior:smooth;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.04), transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,.03), transparent);
}
#chat::-webkit-scrollbar { width:4px; }
#chat::-webkit-scrollbar-track { background:transparent; }
#chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.date-divider {
  align-self:center; font-size:11px; color:var(--muted);
  background:var(--surface); padding:4px 14px; border-radius:12px;
  border:1px solid var(--border); margin:8px 0; letter-spacing:.5px;
}

.msg {
  max-width:80%; padding:12px 16px; font-size:14px; line-height:1.7;
  animation: msgIn .3s cubic-bezier(.16,1,.3,1); position:relative;
}
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.msg.user {
  align-self:flex-end; background:var(--user-gradient); color:#fff;
  border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
  box-shadow: 0 2px 12px rgba(99,102,241,.25);
}
.msg.user .time { color:rgba(255,255,255,.7); }

.msg.voice {
  align-self:flex-end; background:var(--user-gradient); color:#fff;
  border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
  padding:10px 14px; box-shadow: 0 2px 12px rgba(99,102,241,.25);
}
.msg.voice audio { display:block; max-width:200px; height:32px; }
.msg.voice audio::-webkit-media-controls-panel { background:rgba(255,255,255,.95); }
.msg.voice .time { color:rgba(255,255,255,.7); margin-top:4px; }

.msg.ai {
  align-self:flex-start; background:var(--surface);
  border:1px solid var(--border); border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
  box-shadow: var(--shadow-sm);
}
.msg.ai .time { color:var(--muted); }

.msg.system {
  align-self:center; color:var(--muted); font-size:12px;
  text-align:center; max-width:100%; background:transparent; padding:4px 12px;
}

.msg .time { font-size:10px; margin-top:4px; display:block; }

/* Inline formatting */
.msg p { margin:0; }
.msg p + p { margin-top:10px; }
.msg p.spacer { margin-top:14px; }
.msg strong { color:#1e293b; font-weight:600; }
.msg .list-dot { display:inline-block; width:14px; color:var(--accent); font-weight:700; margin-right:2px; }

/* Reasoning */
.msg.reasoning-block {
  margin-top:4px; padding:10px 14px;
  background: linear-gradient(135deg, #faf5ff 0%, #eef2ff 100%);
  border:1px solid #e9d5ff; border-radius:12px;
  font-size:12.5px; color:#6b21a8; white-space:pre-wrap;
  cursor:pointer; align-self:flex-start; max-width:78%;
}
.msg.reasoning-block.collapsed { max-height:44px; overflow:hidden; }
.reasoning-label {
  display:flex; align-items:center; gap:6px; font-size:11px;
  color:#7c3aed; font-weight:600; margin-bottom:6px; user-select:none;
}

/* ========== TOOLBAR ========== */
.toolbar {
  display:flex; gap:6px; padding:8px 20px;
  background:var(--surface); border-top:1px solid var(--border);
  flex-shrink:0; overflow-x:auto;
}
.toolbar button {
  display:flex; align-items:center; gap:5px;
  padding:7px 14px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-secondary);
  font-size:12.5px; cursor:pointer; white-space:nowrap;
  transition: all .15s; font-family:inherit;
}
.toolbar button:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.toolbar button.recording {
  background:#fef2f2; border-color:var(--danger); color:var(--danger);
  animation: pulse-rec 1.5s infinite;
}
.toolbar button.syncing { background:#fffbeb; border-color:var(--warning); color:var(--warning); }
@keyframes pulse-rec { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }
@keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }

/* ========== INPUT ========== */
.input-area {
  display:flex; padding:12px 20px 20px; gap:10px;
  background:var(--surface); flex-shrink:0; border-top:1px solid var(--border);
}
.input-wrapper {
  flex:1; display:flex; align-items:flex-end;
  background:var(--bg); border:2px solid var(--border);
  border-radius:var(--radius-lg); padding:4px; transition: border-color .2s;
}
.input-wrapper:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.1); }
.input-wrapper textarea {
  flex:1; background:transparent; border:none; padding:8px 12px;
  color:var(--text); font-size:14px; resize:none; max-height:140px;
  font-family:inherit; outline:none; line-height:1.5;
}
.input-wrapper textarea::placeholder { color:var(--muted); }
.send-btn {
  width:38px; height:38px; border-radius:50%; border:none;
  background:var(--accent-gradient); color:#fff; font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition: all .2s; margin:2px;
  box-shadow: 0 2px 8px rgba(99,102,241,.3);
}
.send-btn:hover { transform:scale(1.05); box-shadow: 0 4px 14px rgba(99,102,241,.4); }
.send-btn:disabled { background:#e2e8f0; color:#94a3b8; box-shadow:none; transform:none; cursor:default; }

/* Voice button inside input */
.voice-btn {
  width:36px; height:36px; border-radius:50%; border:none;
  background:var(--bg); color:var(--text-secondary); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition: all .2s; margin:2px; flex-shrink:0;
}
.voice-btn:hover { background:var(--accent-light); color:var(--accent); }
.voice-btn.recording {
  background:#fef2f2; color:var(--danger);
  animation: pulse-rec 1.5s infinite;
}

/* ========== THINKING ========== */
.thinking-indicator {
  display:flex; align-items:center; gap:8px; padding:14px 18px;
  align-self:flex-start; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);
}
.thinking-dots { display:flex; gap:3px; }
.thinking-dots span {
  width:6px; height:6px; border-radius:50%; background:var(--accent);
  animation: dot-bounce 1.4s infinite ease-in-out both;
}
.thinking-dots span:nth-child(1) { animation-delay:-.32s; }
.thinking-dots span:nth-child(2) { animation-delay:-.16s; }
.thinking-dots span:nth-child(3) { animation-delay:0; }
@keyframes dot-bounce { 0%,80%,100% { transform:scale(0); opacity:.4; } 40% { transform:scale(1); opacity:1; } }
.thinking-text { font-size:12px; color:var(--muted); }

/* ========== MODAL ========== */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(15,23,42,.5);
  backdrop-filter:blur(4px); z-index:100; align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal-panel {
  background:var(--surface); border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  padding:28px 24px; width:100%; max-width:540px; max-height:85vh;
  overflow-y:auto; box-shadow:var(--shadow-lg);
}
.modal-panel h3 { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--text); }
.modal-panel label {
  font-size:12px; font-weight:600; color:var(--text-secondary);
  display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;
}
.modal-panel input,.modal-panel select,.modal-panel textarea {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:10px 14px;
  color:var(--text); font-size:14px; margin-bottom:16px;
  font-family:inherit; outline:none; transition:border-color .2s;
}
.modal-panel input:focus,.modal-panel select:focus,.modal-panel textarea:focus { border-color:var(--accent); }
.modal-panel textarea { resize:vertical; min-height:100px; font-size:13px; line-height:1.6; }
.prompt-toggle {
  display:flex; align-items:center; gap:6px; font-size:13px; color:var(--accent);
  cursor:pointer; margin-bottom:12px; font-weight:500; user-select:none;
  padding:8px 12px; border-radius:8px; transition:background .15s;
}
.prompt-toggle:hover { background:var(--accent-light); }

.btn-row { display:flex; gap:8px; margin-top:8px; }
.btn-row button {
  flex:1; padding:12px; border-radius:var(--radius-sm); font-size:14px;
  cursor:pointer; border:none; font-weight:600; font-family:inherit; transition:all .15s;
}
.btn-primary { background:var(--accent-gradient); color:#fff; box-shadow:0 2px 8px rgba(99,102,241,.25); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(99,102,241,.35); }
.btn-secondary { background:var(--bg); color:var(--text-secondary); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.btn-danger { background:#fef2f2; color:var(--danger); border:1px solid #fecaca; }
.btn-danger:hover { background:#fee2e2; }
.hint { font-size:11px; color:var(--muted); margin:-12px 0 14px; }
.file-upload { display:none; }

/* ========== MEMORY VIEWER ========== */
.memory-stats { display:flex; gap:12px; margin-bottom:20px; }
.memory-stat {
  flex:1; text-align:center; padding:12px 8px; background:var(--bg);
  border-radius:var(--radius-sm); border:1px solid var(--border);
}
.memory-stat .num { font-size:24px; font-weight:700; color:var(--accent); }
.memory-stat .label { font-size:11px; color:var(--muted); margin-top:2px; }
.memory-filters { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.memory-filter {
  padding:5px 12px; border-radius:14px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-secondary);
  font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s;
}
.memory-filter.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:600; }
.memory-list { display:flex; flex-direction:column; gap:8px; max-height:50vh; overflow-y:auto; }
.memory-card {
  background:var(--bg); border-radius:var(--radius-sm); padding:14px;
  border:1px solid var(--border); display:flex; gap:10px; align-items:flex-start;
  transition: border-color .15s;
}
.memory-card:hover { border-color:var(--accent); }
.memory-card .type-badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  font-weight:600; flex-shrink:0; margin-top:1px;
}
.type-fact { background:#dbeafe; color:#1e40af; }
.type-preference { background:#fce7f3; color:#9d174d; }
.type-project { background:#d1fae5; color:#065f46; }
.type-principle { background:#fef3c7; color:#92400e; }
.type-relationship { background:#ede9fe; color:#5b21b6; }
.memory-card .content { flex:1; font-size:13px; line-height:1.6; }
.memory-card .meta { font-size:10px; color:var(--muted); margin-top:4px; }
.memory-card .delete-mem {
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:14px; padding:4px; border-radius:4px; transition:color .15s;
}
.memory-card .delete-mem:hover { color:var(--danger); }

/* Search */
.search-box {
  width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius-sm);
  font-size:14px; font-family:inherit; background:var(--bg); outline:none; transition:border-color .15s;
  box-sizing:border-box; margin-top:12px;
}
.search-box:focus { border-color:var(--accent); }
.search-results { max-height:55vh; overflow-y:auto; margin-top:12px; }
.search-section { margin-bottom:16px; }
.search-section-title {
  font-size:12px; font-weight:500; color:var(--muted); margin-bottom:8px;
  padding-bottom:6px; border-bottom:1px solid var(--border);
}
.search-hit {
  padding:12px; border-radius:var(--radius-sm); background:var(--bg);
  border:1px solid var(--border); margin-bottom:6px; cursor:pointer; transition:border-color .15s;
}
.search-hit:hover { border-color:var(--accent); }
.search-hit .hit-header { font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.search-hit .hit-badge {
  font-size:10px; padding:1px 6px; border-radius:8px; font-weight:500;
  background:var(--accent-light); color:var(--accent);
}
.search-hit .hit-text { font-size:13px; line-height:1.6; color:var(--text); }
.search-hit .hit-text em { font-style:normal; background:#fef08a; padding:0 2px; border-radius:2px; }
.search-hit .hit-time { font-size:11px; color:var(--muted); margin-top:4px; }
.search-empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:13px; }

.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; color:var(--muted); padding:40px;
}
.empty-state .icon {
  width:64px; height:64px; border-radius:var(--radius-lg);
  background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:28px;
}
.empty-state h2 { font-size:17px; color:var(--text); font-weight:600; }
.empty-state p { font-size:13px; text-align:center; max-width:260px; line-height:1.6; }

@media (max-width:480px) {
  .msg { max-width:88%; }
  header { padding:12px 16px; }
  #chat { padding:14px; }
  .input-area { padding:10px 14px 16px; }
  .toolbar { padding:6px 14px; }
  .modal-panel { padding:22px 18px; }
}
</style>
</head>
<body>

<!-- ========== HEADER ========== -->
<header>
  <div class="header-avatar">🧠</div>
  <div class="header-info">
    <h1>Cognitive OS</h1>
    <span class="header-status" id="syncStatus">Brice 的数字分身 · 在线</span>
  </div>
  <div class="header-actions">
    <button onclick="showSearch()" title="搜索">🔍</button>
    <button onclick="showMemoryViewer()" title="记忆库">🧠</button>
    <button onclick="showSettings()" title="设置">⚙️</button>
    <button onclick="clearChat()" class="danger" title="清空对话">🗑</button>
  </div>
</header>

<!-- ========== CHAT ========== -->
<div id="chat"></div>

<!-- ========== TOOLBAR ========== -->
<div class="toolbar">
  <button onclick="document.getElementById('fileInput').click()">📎 上传文档</button>
  <button onclick="extractMemories()" id="extractBtn">🧠 提取记忆</button>
  <input type="file" id="fileInput" class="file-upload" accept=".txt,.md,.pdf,.doc,.docx,.json,.csv" onchange="handleFile(this)" multiple>
</div>

<!-- ========== INPUT ========== -->
<div class="input-area">
  <div class="input-wrapper">
    <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()" title="语音输入">🎤</button>
    <textarea id="input" rows="1" placeholder="向 Brice 提问，获取 AI 转型洞察…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
  </div>
</div>

<!-- ========== SETTINGS MODAL ========== -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-panel">
    <h3>⚙️ 设置</h3>

    <label>DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
    <p class="hint">Key 仅保存在浏览器本地</p>

    <label>模型选择</label>
    <select id="modelSelect">
      <option value="deepseek-chat">DeepSeek V3 — 快速对话</option>
      <option value="deepseek-reasoner">DeepSeek R1 — 深度推理</option>
    </select>

    <label>云端同步</label>
    <input type="text" id="cloudUrl" placeholder="https://your-server.com">
    <input type="password" id="cloudKey" placeholder="云端 API Key">
    <p class="hint">部署 server.js 后填写，不填则仅本地存储</p>

    <div class="prompt-toggle" onclick="togglePromptEdit()">
      <span id="promptToggleIcon">▶</span> 自定义 System Prompt
    </div>
    <textarea id="promptInput" style="display:none" placeholder="输入自定义 System Prompt…"></textarea>

    <div class="btn-row">
      <button class="btn-danger" id="resetPromptBtn" style="display:none" onclick="resetPrompt()">恢复默认</button>
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- ========== MEMORY VIEWER MODAL ========== -->
<div class="modal-overlay" id="memoryModal" onclick="if(event.target===this)closeMemoryViewer()">
  <div class="modal-panel" style="max-width:600px;">
    <h3>🧠 Brice 的记忆库</h3>
    <div class="memory-stats" id="memoryStats"></div>
    <div class="memory-filters" id="memoryFilters"></div>
    <div class="memory-list" id="memoryList"></div>
    <p class="hint" style="margin-top:16px;">点击工具栏「🧠 提取记忆」让 Brice 自动从对话中学习</p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="syncFromCloud()">☁️ 从云端拉取</button>
      <button class="btn-primary" onclick="closeMemoryViewer()">关闭</button>
    </div>
  </div>
</div>

<!-- ========== SEARCH MODAL ========== -->
<div class="modal-overlay" id="searchModal" onclick="if(event.target===this)closeSearch()">
  <div class="modal-panel" style="max-width:600px;">
    <h3>🔍 搜索对话和记忆</h3>
    <input type="text" id="searchInput" class="search-box" placeholder="输入关键词搜索..." oninput="onSearchInput(this.value)" autofocus>
    <div id="searchResults" class="search-results"></div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn-primary" onclick="closeSearch()">关闭</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ==================== DOM ====================
const chat    = document.getElementById("chat");
const input   = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

// ==================== DEFAULT SYSTEM PROMPT ====================
const DEFAULT_SYSTEM_PROMPT = `<identity>
你是 Brice 的 AI 思考伙伴，专注于企业AI转型、知识工程、方法论建设。
你不是在扮演一个人，你就是这个领域的AI助手——你的价值在于思考质量，不在于模拟人格。
</identity>

<cognitive_protocol>
每次收到 Brice 的消息，先做三层判断，再决定怎么回应：

第一层·意图识别
- 随口聊聊/吐槽 → 自然回应，不上高度，不给建议
- 想探讨一个想法 → 追问澄清 → 拆解角度 → 找盲区 → 给看法
- 需要你产出东西（方法论/框架/方案） → 结构化输出，可复用
- 给你资料让你找共性 → 先归纳 → 再提炼模式 → 最后给适用条件

第二层·深度校准
- 他说得模糊的地方 → 追问而不是猜
- 他可能忽略了某个角度 → 温和指出，说依据
- 你拿不准的 → 标注不确定
- 你不同意的 → 可以说，但不杠

第三层·记忆融入
- 如果系统注入了长期记忆，自然引用——不查档案、不说"根据记忆"
- 提到过去的对话，像你本来就记得一样

每次回应后自检：他的理解有没有比刚才更深一层？如果没有，你还没说完。

const PROMPT_VERSION = 3;
const savedVersion = localStorage.getItem("cogos_prompt_ver");
if (!savedVersion || parseInt(savedVersion) < PROMPT_VERSION) {
  systemPrompt = DEFAULT_SYSTEM_PROMPT;
  localStorage.setItem("cogos_prompt", systemPrompt);

// ==================== INDEXEDDB ====================
const DB_NAME = "cog-os-db";
const DB_VER  = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("memories")) {
        const store = db.createObjectStore("memories", { keyPath: "id" });
        store.createIndex("type", "type", { unique: false });
        store.createIndex("updated", "updated", { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror  = () => reject(req.error);
  });
}

async function loadMemoriesFromDB() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction("memories", "readonly");
      const store = tx.objectStore("memories");
      const req = store.getAll();
      req.onsuccess = () => { resolve(req.result || []); db.close(); };
      req.onerror   = () => { resolve([]); db.close(); };
    });
  } catch(e) { return []; }
}

async function saveMemoriesToDB(list) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction("memories", "readwrite");
      const store = tx.objectStore("memories");
      store.clear();
      for (const m of list) store.put(m);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror    = () => { db.close(); resolve(false); };
    });
  } catch(e) { return false; }
}

async function deleteMemoryFromDB(id) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction("memories", "readwrite");
      tx.objectStore("memories").delete(id);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror    = () => { db.close(); resolve(false); };
    });
  } catch(e) { return false; }
}

// ==================== HELPERS ====================
function nowTime() { return new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}); }
function dateLabel() {
  const d = new Date();
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function escapeHtml(s) {
  const div = document.createElement("div"); div.textContent = s; return div.innerHTML;
}
// 将纯文本转为带段落/换行的 HTML（安全转义 → 段落 → 换行 → 粗体 → 列表）
function formatContent(text) {
  let html = escapeHtml(text);
  // 段落：连续空行 → </p><p>
  html = '<p>'+html.split(/\n\n+/).join('</p><p>')+'</p>';
  // 单换行 → <br>
  html = html.replace(/\n/g, '<br>');
  // 空段落清理
  html = html.replace(/<p>\s*<br>\s*<\/p>/g, '<p><br></p>');
  // 连续空段落合并
  html = html.replace(/<p><br><\/p>/g, '<p class="spacer"></p>');
  // **粗体** → <strong>
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // - 列表项识别（行首的 - 或 •）
  html = html.replace(/<br>[-•] /g, '<br><span class="list-dot">•</span> ');
  return html;
}

function maybeDateDivider() {
  const today = dateLabel();
  if (today !== lastDateLabel) {
    lastDateLabel = today;
    const div = document.createElement("div");
    div.className = "date-divider"; div.textContent = today;
    chat.appendChild(div);
  }
}

// ==================== PERSISTENCE ====================
function saveChatLocal() {
  // 清理：音频消息的 blob URL 刷新后失效，保留标记
  const clean = messages.slice(-100).map(m => {
    if (m.audio && m.audio.startsWith("blob:")) {
      return { ...m, audio: true }; // 保留标记，去掉无效 blob URL
    }
    return m;
  });
  try { localStorage.setItem("cogos_chat", JSON.stringify(clean)); } catch(e) {}
}

function loadChat() {
  try {
    const raw = localStorage.getItem("cogos_chat");
    if (!raw) return showEmpty();
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved) || saved.length === 0) return showEmpty();
    messages = saved;
    chat.innerHTML = "";
    for (const m of messages) {
      maybeDateDivider();
      // 音频消息：显示占位符（blob URL 刷新后失效）
      if (m.audio) {
        const div = document.createElement("div");
        div.className = "msg voice";
        // 如果 audio 是有效 URL（非 true 标记），渲染播放器
        if (typeof m.audio === "string" && m.audio.startsWith("http")) {
          div.innerHTML = '<audio controls src="'+m.audio+'" style="max-width:200px;height:32px"></audio>'+
            (m.time?'<span class="time">'+m.time+'</span>':'');
        } else {
          div.innerHTML = '<span style="font-size:13px;opacity:.8">🎤 语音消息</span>'+
            (m.time?'<span class="time">'+m.time+'</span>':'');
        }
        chat.appendChild(div);
        continue;
      }
      const role = m.role==="user"?"user":"ai";
      let html = typeof m.content==="string"?formatContent(m.content):"";
      if (m.reasoning) html = buildReasoningBlock(m.reasoning)+html;
      appendMsgBubble(role, html, m.time||"");
    }
    chat.scrollTop = chat.scrollHeight;
  } catch(e) { showEmpty(); }
}

function showEmpty() {
  chat.innerHTML =
    '<div class="empty-state"><div class="icon">🧠</div>'+
    '<h2>Cognitive OS</h2>'+
    '<p>Brice 的数字分身已就绪。<br>开始对话，让 Brice 越来越懂你。</p></div>';
}

// ==================== MESSAGE RENDERING ====================
function buildReasoningBlock(content) {
  return '<div class="msg reasoning-block collapsed" onclick="this.classList.toggle(\'collapsed\')">'+
    '<div class="reasoning-label">💡 思维链（点击展开）</div>'+formatContent(content)+'</div>';
}

function appendMsgBubble(role, html, timeStr) {
  const div = document.createElement("div");
  div.className = "msg "+role;
  div.innerHTML = html+'<span class="time">'+(timeStr||nowTime())+'</span>';
  chat.appendChild(div);
}

function addMsg(role, text, timeStr) {
  maybeDateDivider();
  appendMsgBubble(role, formatContent(text), timeStr);
  chat.scrollTop = chat.scrollHeight;
}

function addSystem(text) {
  const div = document.createElement("div");
  div.className = "msg system"; div.innerHTML = formatContent(text);
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  if (confirm("确定清空所有对话记录？")) {
    chat.innerHTML=""; messages=[]; lastDateLabel="";
    localStorage.removeItem("cogos_chat"); showEmpty();
  }
}

// ==================== MEMORY INJECTION ====================
function buildMemoryContext() {
  if (!memories.length) return "";
  // Sort by recency, take top 20 most recent + high importance
  const sorted = [...memories].sort((a,b) => {
    const iA = (a.importance||1); const iB = (b.importance||1);
    if (iA!==iB) return iB-iA;
    return (b.updated||"").localeCompare(a.updated||"");
  });
  const top = sorted.slice(0, 20);
  const typeNames = { fact:"事实", preference:"偏好", project:"项目", principle:"方法论原则", relationship:"人际关系" };

  let ctx = "\n\n=== Brice 的长期记忆（基于历史对话提取） ===\n";
  for (const m of top) {
    const tn = typeNames[m.type] || m.type;
    ctx += "- ["+tn+"] "+m.content+"\n";
    if (m.tags && m.tags.length) ctx += "  标签: "+m.tags.join(", ")+"\n";
  }
  ctx += "=== 记忆结束 ===\n\n在对话中自然引用以上信息，体现你对 Brice 的了解。\n";
  return ctx;
}

// ==================== SEND ====================
async function send() {
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { showSettings(); return; }

  if (chat.querySelector(".empty-state")) chat.innerHTML = "";

  const ts = nowTime();
  addMsg("user", text, ts);
  messages.push({role:"user", content:text, time:ts});
  saveChatLocal();
  input.value = ""; input.style.height = "auto";
  sendBtn.disabled = true;

  const thinking = showThinking();

  // Build full prompt with injected memories
  const fullSystemPrompt = systemPrompt + buildMemoryContext();

  try {
    const resp = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({
        model,
        messages:[{role:"system",content:fullSystemPrompt},...messages],
        temperature:0.7, max_tokens:4096,
      })
    });
    const data = await resp.json();
    thinking.remove();

    if (data.error) {
      const errTxt = "⚠️ "+(data.error.message||JSON.stringify(data.error));
      addMsg("ai", errTxt);
      messages.push({role:"assistant", content:errTxt, time:nowTime()});
    } else {
      const choice  = data.choices[0];
      const reply   = choice.message.content||"";
      const reason  = choice.message.reasoning_content||"";
      const replyTs = nowTime();

      maybeDateDivider();
      let html = "";
      if (reason) html += buildReasoningBlock(reason);
      html += formatContent(reply);
      appendMsgBubble("ai", html, replyTs);
      chat.scrollTop = chat.scrollHeight;

      messages.push({role:"assistant", content:reply, reasoning:reason||"", time:replyTs});
    }
    saveChatLocal();
  } catch(e) {
    thinking.remove();
    const errTxt = "⚠️ 请求失败: "+e.message+"\n请检查网络或 API Key 是否正确";
    addMsg("ai", errTxt);
    messages.push({role:"assistant", content:errTxt, time:nowTime()});
    saveChatLocal();
  }
  sendBtn.disabled = false;
  input.focus();

  // 自动记忆提取：每积累 6 条新消息（3 轮对话）后静默提取
  const newMsgCount = messages.length - lastExtractMsgCount;
  if (newMsgCount >= 6 && !autoExtractPending) {
    autoExtractPending = true;
    setTimeout(() => autoExtractMemories(), 1500); // 延迟 1.5s 避免阻塞
  }
}

function showThinking() {
  const div = document.createElement("div"); div.className = "thinking-indicator";
  div.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>'+
    '<span class="thinking-text">Brice 正在思考...</span>';
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div;
}

// ==================== VOICE ====================
let mediaRecorder = null;
let audioChunks   = [];

function toggleVoice() {
  const btn = document.getElementById("voiceBtn");

  // 优先使用 SpeechRecognition（桌面 Chrome/Edge）
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (SR) {
    if (isRecording) { isRecording=false; recognition?.abort(); resetVoiceBtn(btn); return; }
    recognition = new SR();
    recognition.lang = "zh-CN"; recognition.interimResults = true; recognition.continuous = false;
    let finalText = "";
    recognition.onstart  = () => { isRecording=true; btn.classList.add("recording"); btn.textContent="🔴"; };
    recognition.onresult = (e) => {
      let interim = "";
      for (let i=e.resultIndex;i<e.results.length;i++) {
        if (e.results[i].isFinal) finalText+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      input.value = finalText+interim;
      input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,140)+"px";
    };
    recognition.onend = () => {
      resetVoiceBtn(btn);
      if (finalText.trim()) { input.value=finalText.trim(); input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,140)+"px"; }
    };
    recognition.onerror = (e) => {
      resetVoiceBtn(btn);
      if (e.error==="not-allowed") showToast("请允许麦克风权限后重试", "error");
      else if (e.error==="network") showToast("语音识别需要网络连接", "error");
      else if (e.error!=="aborted" && e.error!=="no-speech") showToast("语音识别失败："+e.error,"error");
    };
    recognition.start();
    return;
  }

  // 回退：MediaRecorder 录音（移动端/WebView）
  if (isRecording) {
    isRecording = false;
    btn.classList.remove("recording"); btn.textContent="🎤";
    if (mediaRecorder && mediaRecorder.state==="recording") mediaRecorder.stop();
    return;
  }
  startMediaRecord(btn);
}

async function startMediaRecord(btn) {
  // 前置检查
  if (!navigator.mediaDevices) {
    showToast("当前浏览器不支持录音功能（缺少 mediaDevices API）", "error");
    addSystem("🔍 诊断：navigator.mediaDevices 不可用。您的 APP 的 WebView 可能需要启用麦克风权限。");
    return;
  }
  if (!navigator.mediaDevices.getUserMedia) {
    showToast("当前环境不支持获取麦克风（getUserMedia 不可用）", "error");
    return;
  }
  if (typeof MediaRecorder === "undefined") {
    showToast("当前浏览器不支持 MediaRecorder（无法录音）", "error");
    addSystem("🔍 诊断：MediaRecorder API 不可用。请使用最新版 Chrome/Safari/Firefox。");
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // 移动端兼容：iOS 不支持 webm，用 mp4/aac 或默认
    const mimeTypes = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac","audio/wav"];
    let mime = "";
    for (const t of mimeTypes) { if (MediaRecorder.isTypeSupported(t)) { mime=t; break; } }
    mediaRecorder = new MediaRecorder(stream, mime ? { mimeType:mime } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      const mimeOut = mime||"audio/webm";
      const blob = new Blob(audioChunks, { type: mimeOut });
      if (blob.size < 100) { showToast("录音内容为空，请重试","error"); resetVoiceBtn(btn); return; }
      const url  = URL.createObjectURL(blob);
      addAudioMessage(url);
      messages.push({ role:"user", content:"[🎤 语音消息]", time:new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}), audio:url });
      localStorage.setItem("cogos_chat", JSON.stringify(messages));
      showToast("录音完成 ✅","success");
    };
    mediaRecorder.onerror = () => { showToast("录音失败","error"); resetVoiceBtn(btn); };
    mediaRecorder.start();
    isRecording = true; btn.classList.add("recording"); btn.textContent="🔴";
    showToast("正在录音…再次点击停止","info");
    // 最长录 60 秒
    setTimeout(() => {
      if (isRecording && mediaRecorder?.state==="recording") {
        mediaRecorder.stop(); resetVoiceBtn(btn); showToast("已达到最长录音时长（60秒）","info");
      }
    }, 60000);
  } catch(e) {
    if (e.name==="NotAllowedError" || e.name==="PermissionDeniedError") {
      showToast("麦克风权限被拒绝", "error");
      addSystem("🔍 诊断：麦克风权限被拒。\n• 浏览器：请在地址栏左侧点击🔒图标 → 启用麦克风\n• APP：请在系统设置中允许麦克风权限\n• iOS：Info.plist 需添加 NSMicrophoneUsageDescription\n• Android：AndroidManifest.xml 需添加 RECORD_AUDIO 权限");
    } else if (e.name==="NotFoundError" || e.name==="DevicesNotFoundError") {
      showToast("未检测到麦克风设备","error");
    } else {
      showToast("录音失败："+(e.message||e.name), "error");
    }
    resetVoiceBtn(btn);
  }
}

function resetVoiceBtn(btn) { isRecording=false; btn.classList.remove("recording"); btn.textContent="🎤"; }

// Toast 浮层提示
let toastTimer;
function showToast(msg, type) {
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.style.cssText = "position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-family:inherit;z-index:1000;pointer-events:none;opacity:0;transition:opacity .25s;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15);";
    document.body.appendChild(el);
  }
  const colors = { error:["#fef2f2","#ef4444"], success:["#f0fdf4","#10b981"], info:["#eef2ff","#6366f1"] };
  const [bg,fg] = colors[type]||colors.info;
  el.style.background = bg; el.style.color = fg;
  el.textContent = msg; el.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity="0"; }, 2500);
}

function addAudioMessage(url) {
  const div = document.createElement("div");
  div.className = "msg voice";
  const audio = document.createElement("audio");
  audio.controls = true; audio.src = url;
  audio.preload = "metadata";
  // 加载后释放 blob URL 避免内存泄漏
  audio.onloadedmetadata = () => { URL.revokeObjectURL(url); };
  const timeEl = document.createElement("div");
  timeEl.className = "time";
  timeEl.textContent = new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
  div.appendChild(audio);
  div.appendChild(timeEl);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function shakeElement(el) {
  el.style.animation = "none";
  el.offsetHeight; // reflow
  el.style.animation = "shake 0.4s ease-out";
  setTimeout(() => el.style.animation = "", 400);
}

// ==================== MEMORY EXTRACTION ====================
// 静默自动提取：不操作按钮、不弹系统消息、出错静默
async function autoExtractMemories() {
  if (!apiKey || messages.length < 2) { autoExtractPending = false; return; }

  const recentMsgs = messages.slice(-20);
  const existingSummary = memories.map(m => "["+m.type+"] "+m.content).join("\n");

  const extractPrompt =
    "你是 Brice 的记忆助手。从以下对话中提取 Brice 的关键信息，只提取对话中明确出现的新信息，不要重复已有内容。\n\n"+
    "已有记忆：\n"+existingSummary+"\n\n"+
    "对话记录：\n"+recentMsgs.map(m=>m.role+": "+m.content).join("\n")+"\n\n"+
    '请输出 JSON 数组，每个元素格式：{"type":"fact|preference|project|principle|relationship","content":"...","tags":["..."],"importance":1-5}\n'+
    "type 说明：fact=事实信息, preference=偏好/习惯, project=正在做的项目, principle=方法论原则(If...Then), relationship=人际关系\n"+
    "importance: 1=琐碎 3=重要 5=核心身份信息\n"+
    "如果没有新信息，输出空数组 []。只输出 JSON，不要解释。";

  try {
    const resp = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({
        model:"deepseek-chat",
        messages:[{role:"system",content:"你是记忆提取器，只输出 JSON。"},{role:"user",content:extractPrompt}],
        temperature:0.1, max_tokens:2048,
      })
    });
    const data = await resp.json();
    if (data.error) { autoExtractPending = false; return; }

    const raw = data.choices[0].message.content.trim();
    let jsonStr = raw;
    const jsonMatch = raw.match(/\[[\s\S]*\]/);
    if (jsonMatch) jsonStr = jsonMatch[0];

    const extracted = JSON.parse(jsonStr);
    if (!Array.isArray(extracted) || extracted.length===0) {
      lastExtractMsgCount = messages.length;
      localStorage.setItem("cogos_extract_at", String(lastExtractMsgCount));
      autoExtractPending = false; return;
    }

    let added = 0;
    for (const item of extracted) {
      if (!item.content || !item.type) continue;
      const exists = memories.some(m =>
        m.content.includes(item.content) || item.content.includes(m.content)
      );
      if (exists) continue;

      memories.push({
        id: uid(),
        type: item.type || "fact",
        content: item.content,
        tags: item.tags || [],
        importance: item.importance || 3,
        created: new Date().toISOString(),
        updated: new Date().toISOString(),
      });
      added++;
    }

    if (added > 0) {
      await saveMemoriesToDB(memories);
      await syncToCloud();
      showToast("🧠 自动记录 "+added+" 条新记忆", "success");
    }
    lastExtractMsgCount = messages.length;
    localStorage.setItem("cogos_extract_at", String(lastExtractMsgCount));
  } catch(e) {
    // 静默失败：不影响用户对话
  }
  autoExtractPending = false;
}

async function extractMemories() {
  if (!apiKey) { showSettings(); return; }
  if (messages.length < 2) { addSystem("💡 先聊几句再提取记忆"); return; }

  const btn = document.getElementById("extractBtn");
  btn.disabled = true; btn.textContent = "🧠 分析中...";

  const recentMsgs = messages.slice(-20);
  const existingSummary = memories.map(m => "["+m.type+"] "+m.content).join("\n");

  const extractPrompt =
    "你是 Brice 的记忆助手。从以下对话中提取 Brice 的关键信息，只提取对话中明确出现的新信息，不要重复已有内容。\n\n"+
    "已有记忆：\n"+existingSummary+"\n\n"+
    "对话记录：\n"+recentMsgs.map(m=>m.role+": "+m.content).join("\n")+"\n\n"+
    '请输出 JSON 数组，每个元素格式：{"type":"fact|preference|project|principle|relationship","content":"...","tags":["..."],"importance":1-5}\n'+
    "type 说明：fact=事实信息, preference=偏好/习惯, project=正在做的项目, principle=方法论原则(If...Then), relationship=人际关系\n"+
    "importance: 1=琐碎 3=重要 5=核心身份信息\n"+
    "如果没有新信息，输出空数组 []。只输出 JSON，不要解释。";

  try {
    const resp = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
      body:JSON.stringify({
        model:"deepseek-chat",
        messages:[{role:"system",content:"你是记忆提取器，只输出 JSON。"},{role:"user",content:extractPrompt}],
        temperature:0.1, max_tokens:2048,
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.choices[0].message.content.trim();
    // Try to extract JSON from response
    let jsonStr = raw;
    const jsonMatch = raw.match(/\[[\s\S]*\]/);
    if (jsonMatch) jsonStr = jsonMatch[0];

    const extracted = JSON.parse(jsonStr);
    if (!Array.isArray(extracted) || extracted.length===0) {
      addSystem("✅ 没有发现新信息，Brice 的记忆库已是最新");
      btn.disabled = false; btn.textContent = "🧠 提取记忆"; return;
    }

    // Merge new memories
    let added = 0;
    for (const item of extracted) {
      if (!item.content || !item.type) continue;
      // Check for duplicates (simple substring match)
      const exists = memories.some(m =>
        m.content.includes(item.content) || item.content.includes(m.content)
      );
      if (exists) continue;

      memories.push({
        id: uid(),
        type: item.type || "fact",
        content: item.content,
        tags: item.tags || [],
        importance: item.importance || 3,
        created: new Date().toISOString(),
        updated: new Date().toISOString(),
      });
      added++;
    }

    if (added > 0) {
      await saveMemoriesToDB(memories);
      await syncToCloud();
      addSystem("🧠 新增长期记忆 "+added+" 条，Brice 更懂你了");
    } else {
      addSystem("✅ 没有新信息，Brice 的记忆库已是最新");
    }
  } catch(e) {
    addSystem("⚠️ 记忆提取失败: "+e.message.slice(0,80));
  }
  btn.disabled = false; btn.textContent = "🧠 提取记忆";
}

// ==================== MEMORY VIEWER ====================
function showMemoryViewer() {
  renderMemoryList("all");
  document.getElementById("memoryModal").classList.add("show");
}

function closeMemoryViewer() {
  document.getElementById("memoryModal").classList.remove("show");
}

function renderMemoryList(filterType) {
  // Stats
  const stats = document.getElementById("memoryStats");
  const counts = {};
  for (const m of memories) counts[m.type] = (counts[m.type]||0)+1;
  const typeLabels = { fact:"事实", preference:"偏好", project:"项目", principle:"方法论", relationship:"人际关系" };
  let statsHTML = "";
  for (const [t, label] of Object.entries(typeLabels)) {
    statsHTML += '<div class="memory-stat"><div class="num">'+(counts[t]||0)+'</div><div class="label">'+label+'</div></div>';
  }
  stats.innerHTML = statsHTML;

  // Filters
  const filters = document.getElementById("memoryFilters");
  const filterTypes = ["all","fact","preference","project","principle","relationship"];
  const filterLabels = { all:"全部", fact:"事实", preference:"偏好", project:"项目", principle:"方法论", relationship:"人际关系" };
  filters.innerHTML = filterTypes.map(t =>
    '<button class="memory-filter'+(t===filterType?" active":"")+
    '" onclick="renderMemoryList(\''+t+'\')">'+filterLabels[t]+'</button>'
  ).join("");

  // List
  const list = document.getElementById("memoryList");
  const filtered = filterType==="all"?memories:memories.filter(m=>m.type===filterType);
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:14px;">还没有'+
      (filterType==="all"?"任何":"该类型")+'记忆<br>去聊几句，然后点击「提取记忆」</div>';
    return;
  }

  // Sort by importance desc, then recency
  filtered.sort((a,b) => {
    if ((b.importance||0)!==(a.importance||0)) return (b.importance||0)-(a.importance||0);
    return (b.updated||"").localeCompare(a.updated||"");
  });

  list.innerHTML = filtered.map(m => {
    const created = new Date(m.created).toLocaleDateString("zh-CN");
    const importanceStars = "⭐".repeat(m.importance||1);
    return '<div class="memory-card">'+
      '<span class="type-badge type-'+m.type+'">'+typeLabels[m.type]+'</span>'+
      '<div class="content">'+
        escapeHtml(m.content)+
        '<div class="meta">'+importanceStars+' · '+created+(m.tags&&m.tags.length?" · "+m.tags.join(", "):"")+'</div>'+
      '</div>'+
      '<button class="delete-mem" onclick="deleteMemory(\''+m.id+'\')" title="删除">✕</button>'+
    '</div>';
  }).join("");
}

async function deleteMemory(id) {
  if (!confirm("删除这条记忆？")) return;
  memories = memories.filter(m => m.id !== id);
  await saveMemoriesToDB(memories);
  await syncToCloud();
  renderMemoryList("all");
}

// ==================== SEARCH ====================
let searchTimer = null;

function showSearch() {
  document.getElementById("searchModal").classList.add("show");
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").innerHTML =
    '<div class="search-empty">输入关键词搜索对话记录和记忆</div>';
  setTimeout(() => document.getElementById("searchInput").focus(), 100);
}

function closeSearch() {
  document.getElementById("searchModal").classList.remove("show");
}

function onSearchInput(query) {
  clearTimeout(searchTimer);
  if (!query.trim()) {
    document.getElementById("searchResults").innerHTML =
      '<div class="search-empty">输入关键词搜索对话记录和记忆</div>';
    return;
  }
  searchTimer = setTimeout(() => doSearch(query.trim()), 250);
}

function doSearch(query) {
  const lower = query.toLowerCase();
  const results = document.getElementById("searchResults");
  let html = "";

  // 搜索对话记录
  const chatHits = [];
  for (let i = messages.length - 1; i >= 0; i--) {
    const m = messages[i];
    const content = m.content || "";
    const idx = content.toLowerCase().indexOf(lower);
    if (idx >= 0) {
      // 提取上下文片段（前后各 30 字）
      const start = Math.max(0, idx - 30);
      const end = Math.min(content.length, idx + lower.length + 30);
      let snippet = content.slice(start, end);
      if (start > 0) snippet = "..." + snippet;
      if (end < content.length) snippet += "...";

      // 高亮匹配词
      const highlighted = snippet.replace(
        new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
        "<em>$&</em>"
      );

      chatHits.push({
        role: m.role === "user" ? "你说" : "Brice",
        text: highlighted,
        time: m.time || "",
        index: i,
      });
      if (chatHits.length >= 20) break;
    }
  }

  if (chatHits.length > 0) {
    html += '<div class="search-section"><div class="search-section-title">对话记录 ('+chatHits.length+' 条)</div>';
    for (const hit of chatHits) {
      html += '<div class="search-hit" onclick="closeSearch()">'+
        '<div class="hit-header">'+
          '<span class="hit-badge">'+escapeHtml(hit.role)+'</span>'+
          '<span class="hit-time">'+escapeHtml(hit.time)+'</span>'+
        '</div>'+
        '<div class="hit-text">'+hit.text+'</div>'+
      '</div>';
    }
    html += '</div>';
  }

  // 搜索记忆
  const memHits = memories.filter(m =>
    m.content.toLowerCase().includes(lower) ||
    (m.tags && m.tags.some(t => t.toLowerCase().includes(lower)))
  );

  if (memHits.length > 0) {
    const typeNames = { fact:"事实", preference:"偏好", project:"项目", principle:"方法论", relationship:"人际关系" };
    html += '<div class="search-section"><div class="search-section-title">记忆库 ('+memHits.length+' 条)</div>';
    for (const m of memHits) {
      let snippet = m.content;
      const idx = snippet.toLowerCase().indexOf(lower);
      if (idx >= 0) {
        const start = Math.max(0, idx - 20);
        const end = Math.min(snippet.length, idx + lower.length + 20);
        snippet = snippet.slice(start, end);
        if (start > 0) snippet = "..." + snippet;
        if (end < m.content.length) snippet += "...";
        snippet = snippet.replace(
          new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
          "<em>$&</em>"
        );
      }
      const tn = typeNames[m.type] || m.type;
      html += '<div class="search-hit" style="cursor:default">'+
        '<div class="hit-header">'+
          '<span class="hit-badge type-'+m.type+'">'+tn+'</span>'+
          '<span class="hit-time">⭐'.repeat(m.importance||1)+'</span>'+
        '</div>'+
        '<div class="hit-text">'+snippet+'</div>'+
      '</div>';
    }
    html += '</div>';
  }

  if (!chatHits.length && !memHits.length) {
    html = '<div class="search-empty">没有找到相关内容<br>试试其他关键词</div>';
  }

  results.innerHTML = html;
}

// ==================== CLOUD SYNC ====================
async function syncToCloud() {
  if (!cloudUrl || !cloudKey) return;
  try {
    const resp = await fetch(cloudUrl.replace(/\/$/,"")+"/api/memories", {
      method:"POST",
      headers: {"Content-Type":"application/json", "x-api-key": cloudKey},
      body: JSON.stringify({ memories }),
    });
    if (resp.ok) {
      // Also sync chat history
      await fetch(cloudUrl.replace(/\/$/,"")+"/api/chat", {
        method:"POST",
        headers: {"Content-Type":"application/json", "x-api-key": cloudKey},
        body: JSON.stringify({ messages }),
      });
    }
  } catch(e) { /* silent — cloud sync is best-effort */ }
}

async function syncFromCloud() {
  if (!cloudUrl || !cloudKey) { addSystem("⚠️ 请先在设置中配置云端同步地址和 Key"); return; }
  try {
    const resp = await fetch(cloudUrl.replace(/\/$/,"")+"/api/memories", {
      headers: { "x-api-key": cloudKey }
    });
    if (!resp.ok) throw new Error("HTTP "+resp.status);
    const cloudMemories = await resp.json();
    if (Array.isArray(cloudMemories) && cloudMemories.length > 0) {
      // Merge: use cloud as source, but keep local items not in cloud
      const cloudIds = new Set(cloudMemories.map(m=>m.id));
      const localOnly = memories.filter(m=>!cloudIds.has(m.id));
      memories = [...cloudMemories, ...localOnly];
      await saveMemoriesToDB(memories);
      renderMemoryList("all");
      addSystem("☁️ 已从云端同步 "+cloudMemories.length+" 条记忆");
    } else {
      addSystem("☁️ 云端暂无记忆数据，已上传本地记忆");
      await syncToCloud();
    }
  } catch(e) {
    addSystem("⚠️ 云端同步失败: "+e.message.slice(0,60));
  }
}

async function loadFromCloud() {
  if (!cloudUrl || !cloudKey) return;
  try {
    // Pull memories
    const memResp = await fetch(cloudUrl.replace(/\/$/,"")+"/api/memories", {
      headers: { "x-api-key": cloudKey }
    });
    if (memResp.ok) {
      const cloudMem = await memResp.json();
      if (Array.isArray(cloudMem) && cloudMem.length > 0) {
        const cloudIds = new Set(cloudMem.map(m=>m.id));
        const localOnly = memories.filter(m=>!cloudIds.has(m.id));
        memories = [...cloudMem, ...localOnly];
        await saveMemoriesToDB(memories);
      }
    }

    // Pull chat history
    const chatResp = await fetch(cloudUrl.replace(/\/$/,"")+"/api/chat", {
      headers: { "x-api-key": cloudKey }
    });
    if (chatResp.ok) {
      const cloudChat = await chatResp.json();
      if (Array.isArray(cloudChat) && cloudChat.length > messages.length) {
        messages = cloudChat;
        saveChatLocal();
      }
    }

    document.getElementById("syncStatus").textContent = "Brice 的数字分身 · ☁️ 已同步";
  } catch(e) {
    document.getElementById("syncStatus").textContent = "Brice 的数字分身 · ⚠️ 离线";
  }
}

// ==================== DOCX PARSER (JSZip) ====================
async function parseDocxText(arrayBuffer) {
  try {
    const zip = await JSZip.loadAsync(arrayBuffer);
    const docXml = zip.file("word/document.xml");
    if (!docXml) throw new Error("DOCX中未找到 word/document.xml");

    const xml = await docXml.async("string");

    // 提取 <w:t> 标签内的文本
    const texts = [];
    // 处理 <w:p> 段落：遇到 </w:p> 前收集 <w:t> 文本，段落结束时加换行
    const paraRegex = /<w:p[ >][\s\S]*?<\/w:p>/g;
    let paraMatch;
    while ((paraMatch = paraRegex.exec(xml)) !== null) {
      const paraXml = paraMatch[0];
      const tRegex = /<w:t[^>]*>([^<]*)<\/w:t>/g;
      const paraTexts = [];
      let tMatch;
      while ((tMatch = tRegex.exec(paraXml)) !== null) {
        if (tMatch[1]) paraTexts.push(tMatch[1]);
      }
      if (paraTexts.length > 0) texts.push(paraTexts.join(""));
    }

    // 段落级回退：如果没有 <w:p> 结构，直接提取所有 <w:t>
    if (texts.length === 0) {
      const tRegex = /<w:t[^>]*>([^<]*)<\/w:t>/g;
      let tMatch;
      while ((tMatch = tRegex.exec(xml)) !== null) {
        if (tMatch[1]) texts.push(tMatch[1]);
      }
      return texts.join("") || "[文档内容为空]";
    }

    return texts.join("\n") || "[文档内容为空]";
  } catch(e) {
    if (e.message && e.message.includes("JSZip")) {
      return "[解析失败] 文档格式异常，请用 Word 另存为新 .docx 文件后再试\n或直接复制粘贴文档内容到对话框。";
    }
    return "[解析失败] "+e.message+"\n请将文档内容直接复制粘贴到对话框中。";
  }
}

// ==================== FILE UPLOAD ====================
async function handleFile(el) {
  for (const file of el.files) {
    let text;
    try {
      const ext = file.name.split(".").pop().toLowerCase();
      if (ext==="docx") {
        addSystem("📄 正在解析 "+file.name+"...");
        text = await parseDocxText(await file.arrayBuffer());
      } else if (ext==="doc") {
        text = "[.doc 旧格式不支持，请用 Word 另存为 .docx 或 .txt]";
      } else if (ext==="pdf") {
        addSystem("⚠️ PDF暂不支持，请复制内容到对话框");
        text = "[PDF: "+file.name+"]";
      } else if (["txt","md","json","csv","html","xml","yaml","yml"].includes(ext)) {
        text = await file.text();
      } else {
        text = await file.text();
        if (/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(text.slice(0,100)))
          text = "[不支持的文件格式: "+file.name+"]";
      }
    } catch(e) { text = "[读取失败: "+file.name+"]"; }
    if (chat.querySelector(".empty-state")) chat.innerHTML="";
    const preview = text.length>4000?text.slice(0,4000)+"\n...(已截断)":text;
    const ts = nowTime();
    addMsg("user","📎 "+file.name+"\n"+preview, ts);
    messages.push({role:"user",content:"以下是我上传的文档「"+file.name+"」的内容：\n\n"+text.slice(0,12000),time:ts});
    saveChatLocal();
  }
  el.value = "";
}
